name: Blog CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: blog-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.1'
          extended: true

      - name: Install D2
        env:
          D2_VERSION: "0.7.1"
          D2_SHA256: "eb172adf59f38d1e5a70ab177591356754ffaf9bebb84e0ca8b767dfb421dad7"
        run: |
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/v${D2_VERSION}/d2-v${D2_VERSION}-linux-amd64.tar.gz" -o d2.tar.gz
          echo "${D2_SHA256}  d2.tar.gz" | sha256sum -c
          tar xzf d2.tar.gz
          sudo install d2-v${D2_VERSION}/bin/d2 /usr/local/bin/d2
          rm -rf d2.tar.gz d2-v${D2_VERSION}
          d2 --version

      - name: Generate diagrams
        run: make diagrams -j

      - name: Build
        run: hugo --minify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-public
          path: public

      - name: Package build output
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p release
          tar -czf release/site.tar.gz -C public .

      - name: Setup ORAS
        if: github.event_name != 'pull_request'
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Publish static artifact to GHCR
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/aimloul-blog-static"
          short_sha="${GITHUB_SHA::12}"
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            channel_tag="dev-latest"
          else
            channel_tag="prod-latest"
          fi
          sha_tag="sha-${short_sha}"
          oras push "${image}:${channel_tag}" release/site.tar.gz:application/vnd.myportfolio.static.layer.v1+tar
          oras push "${image}:${sha_tag}" release/site.tar.gz:application/vnd.myportfolio.static.layer.v1+tar

      - name: Trigger infra deploy for published channel
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            target_env="dev"
          else
            target_env="prod"
          fi

          gh api repos/imloul-com/cloudflare-infra/dispatches \
            -f event_type=app-published \
            -f "client_payload[app]=${GITHUB_REPOSITORY}" \
            -f "client_payload[environment]=${target_env}" \
            -f "client_payload[version_override]="

baseURL = 'https://imloul.com/'
languageCode = 'en-us'
title = 'a.imloul'
theme = 'aimloul'
enableRobotsTXT = true
enableGitInfo = true

[related]
  includeNewer = true
  threshold = 50
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100

[taxonomies]
  tag = "tags"
[pagination]
  pagerSize = 5

[params]
  author = 'Imloul Anas'
  description = 'Writing about database internals, systems design, and backend engineering.'
  ogImage = '/og-image.svg'
  ogTheme = 'light'
  giscusRepo = 'AnasImloul/aimloul-blog'
  giscusRepoId = 'R_kgDOR1LvxQ'
  giscusCategory = 'General'
  giscusCategoryId = 'DIC_kwDOR1Lvxc4C53Ls'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.highlight]
    noClasses = true
    style = 'nord'
    lineNos = false
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block  = [["$$", "$$"]]
        inline = [["$", "$"]]

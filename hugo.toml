baseURL = 'https://imloul.com/'
languageCode = 'en-us'
title = 'a.imloul'
theme = 'aimloul'
enableRobotsTXT = true
enableGitInfo = true

[mediaTypes."application/javascript"]
  suffixes = ["js"]

[outputFormats.SW]
  mediaType = "application/javascript"
  baseName = "sw"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "RSS", "SW"]

[related]
  includeNewer = true
  threshold = 50
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100

[taxonomies]
  tag = "tags"
[pagination]
  pagerSize = 5

[params]
  author = 'Imloul Anas'
  description = 'Software engineer writing about database internals, systems design, and backend engineering.'
  intro = 'Software engineer interested in database internals, distributed systems, and programming languages.'
  tagline = 'Software Engineering & Database Internals'
  ogImage = '/og-image.png'
  ogTheme = 'light'
  github = 'https://github.com/AnasImloul'
  linkedin = 'https://linkedin.com/in/anas-imloul'
  giscusRepo = 'AnasImloul/aimloul-blog'
  giscusRepoId = 'R_kgDOR1LvxQ'
  giscusCategory = 'General'
  giscusCategoryId = 'DIC_kwDOR1Lvxc4C53Ls'

  [[params.sections]]
    title = 'Blog'
    description = 'Long-form writing on databases, systems, and engineering.'
    url = '/blog/'

  [[params.sections]]
    title = 'Projects'
    description = 'Things I have built.'
    url = '/projects/'

  [[params.sections]]
    title = 'Tools'
    description = 'Interactive utilities and experiments.'
    url = '/tools/'

  [[params.sections]]
    title = 'Notes'
    description = 'Short-form thoughts and TILs.'
    url = '/notes/'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.highlight]
    noClasses = false
    style = 'nord'
    lineNos = false
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block  = [["$$", "$$"]]
        inline = [["$", "$"]]
